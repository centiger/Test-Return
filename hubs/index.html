const params=new URLSearchParams(location.search);let slug=params.get('hub')||'return';if(!HUBS[slug])slug='return';
function esc(s){return String(s??'')}
function renderTabs(){document.getElementById('tabs').innerHTML=Object.entries(HUBS).map(([k,h])=>`<a class="tab ${k===slug?'active':''}" href="?hub=${k}">${h.label}</a>`).join('')}
function renderHeader(h){document.getElementById('kicker').textContent=h.order;document.getElementById('title').textContent=h.title;document.getElementById('subtitle').textContent=h.subtitle}
function hubName(key){return HUBS[key]?.title || '허브'}
function prevLabel(h){return h.prevLabel || `← 이전 허브: ${hubName(h.prev)}`}
function nextLabel(h){return h.nextLabel || `다음 허브: ${hubName(h.next)} →`}
function renderHub(h){return `<section class="card"><h2 class="sectionTitle">핵심 요약</h2><div class="summaryGrid">${h.summary.map(x=>`<div class="mini"><b>${x[0]}</b><span>${x[1]}</span></div>`).join('')}</div></section>
<section class="card"><h2 class="sectionTitle">${h.label} 흐름</h2><div class="flow">${h.flow.map(x=>`<div class="node"><div class="ico">${x[0]}</div><b>${x[1]}</b><small>${x[2]}</small></div>`).join('')}</div></section>
<section class="card"><h2 class="sectionTitle">${h.mapTitle}</h2><div class="mapWrap"><img src="${h.map}" alt="${h.mapTitle}"><div class="caption">${h.mapCaption}</div></div></section>
<section class="card"><h2 class="sectionTitle">핵심 의미</h2><div class="infoGrid">${h.info.map(x=>`<div class="info"><b>${x[0]}</b><p>${x[1]}</p></div>`).join('')}</div></section>
<section class="card"><h2 class="sectionTitle">연대 흐름</h2><div class="timeline">${h.timeline.map(x=>`<div class="t ${x[2]?'active':''}"><strong>${x[0]}</strong><span>${x[1]}</span></div>`).join('')}</div></section>
<div class="note">${h.note}</div>
<div class="actions">${h.prev?`<a class="action secondary" href="?hub=${h.prev}">${prevLabel(h)}</a>`:`<a class="action secondary" href="../index.html">← Matrix로 돌아가기</a>`}${h.next?`<a class="action primary" href="?hub=${h.next}">${nextLabel(h)}</a>`:(h.nextUrl?`<a class="action primary" href="${h.nextUrl}">${h.nextLabel||'다음 Matrix로 이동 →'}</a>`:`<a class="action primary" href="../index.html">Matrix로 돌아가기</a>`)}</div>`}
function renderPlaceholder(h){return `<section class="card placeholder"><h2>${h.title}</h2><p>${h.subtitle}</p><p style="margin-top:10px;font-weight:900;color:#236B63">아직 상세 허브 제작 전입니다.</p></section><div class="actions">${h.prev?`<a class="action secondary" href="?hub=${h.prev}">${prevLabel(h)}</a>`:`<a class="action secondary" href="../index.html">← Matrix로 돌아가기</a>`}${h.next?`<a class="action primary" href="?hub=${h.next}">${nextLabel(h)}</a>`:(h.nextUrl?`<a class="action primary" href="${h.nextUrl}">${h.nextLabel||'다음 Matrix로 이동 →'}</a>`:`<a class="action primary" href="../index.html">Matrix로 돌아가기</a>`)}</div>`}
function renderHubList(){document.getElementById('hubList').innerHTML=Object.entries(HUBS).map(([k,h])=>`<a class="hubItem ${k===slug?'active':''}" href="?hub=${k}"><b>${h.order.replace(' · ',' ')}</b><span>${h.short} · ${h.subtitle}</span></a>`).join('')}
function render(){const h=HUBS[slug];renderTabs();renderHeader(h);renderHubList();document.getElementById('content').innerHTML=h.summary?renderHub(h):renderPlaceholder(h)}
document.getElementById('hubListBtn').onclick=()=>document.getElementById('drawer').classList.add('show');document.getElementById('drawerClose').onclick=()=>document.getElementById('drawer').classList.remove('show');document.getElementById('drawer').onclick=e=>{if(e.target.id==='drawer')document.getElementById('drawer').classList.remove('show')};
render();
if('serviceWorker'in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}
